<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>규칙 기반 립리딩</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

h1{
    margin:10px;
}

.container{
    position:relative;
    width:640px;
    margin:auto;
}

video,canvas{
    width:640px;
    height:480px;
    border-radius:10px;
}

canvas{
    position:absolute;
    left:0;
    top:0;
}

.info{
    margin-top:15px;
    font-size:24px;
}

#sequence{
    color:#00ff88;
}

#word{
    color:#ffcc00;
    font-size:30px;
}
</style>
</head>
<body>

<h1>실시간 립리딩</h1>

<div class="container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
</div>

<div class="info">
    현재 입모양 :
    <span id="current">-</span>
</div>

<div class="info">
    시퀀스 :
    <span id="sequence">-</span>
</div>

<div class="info">
    추정 단어 :
    <span id="word">-</span>
</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 640;
canvas.height = 480;

const currentText = document.getElementById("current");
const sequenceText = document.getElementById("sequence");
const wordText = document.getElementById("word");

let sequence = [];
let lastShape = "";
let lastUpdate = 0;

function distance(a,b){
    const dx = a.x-b.x;
    const dy = a.y-b.y;
    return Math.sqrt(dx*dx+dy*dy);
}

function detectMouthShape(lm){

    const left = lm[61];
    const right = lm[291];

    const top = lm[13];
    const bottom = lm[14];

    const width = distance(left,right);
    const height = distance(top,bottom);

    const ratio = height/width;

    if(ratio < 0.05)
        return "ㅁ";

    if(ratio < 0.12)
        return "ㅣ";

    if(ratio < 0.18)
        return "ㅓ";

    if(ratio < 0.28)
        return "ㅏ";

    return "ㅗ";
}

function guessWord(seq){

    const text = seq.join("");

    if(text.includes("ㅁㅏㅁㅏ"))
        return "마마";

    if(text.includes("ㅓㅁㅁㅏ"))
        return "엄마";

    if(text.includes("ㅏㅏ"))
        return "아아";

    if(text.includes("ㅗㅏ"))
        return "와";

    if(text.includes("ㅣㅏ"))
        return "야";

    return "-";
}

const faceMesh = new FaceMesh({
    locateFile:(file)=>{
        return `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`;
    }
});

faceMesh.setOptions({
    maxNumFaces:1,
    refineLandmarks:true,
    minDetectionConfidence:0.5,
    minTrackingConfidence:0.5
});

faceMesh.onResults(results=>{

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.drawImage(
        results.image,
        0,
        0,
        canvas.width,
        canvas.height
    );

    if(results.multiFaceLandmarks.length>0){

        const lm = results.multiFaceLandmarks[0];

        const mouthPoints = [
            61,146,91,181,84,17,
            314,405,321,375,
            291,308,324,318,
            402,317,14,87,
            178,88
        ];

        ctx.strokeStyle="#00ff00";
        ctx.lineWidth=2;

        ctx.beginPath();

        mouthPoints.forEach((idx,i)=>{

            const p = lm[idx];

            const x = p.x*canvas.width;
            const y = p.y*canvas.height;

            if(i===0)
                ctx.moveTo(x,y);
            else
                ctx.lineTo(x,y);
        });

        ctx.closePath();
        ctx.stroke();

        const shape = detectMouthShape(lm);

        currentText.innerText = shape;

        const now = Date.now();

        if(shape!==lastShape &&
           now-lastUpdate>250){

            sequence.push(shape);

            if(sequence.length>20)
                sequence.shift();

            sequenceText.innerText =
                sequence.join(" ");

            wordText.innerText =
                guessWord(sequence);

            lastShape = shape;
            lastUpdate = now;
        }
    }
});

const camera = new Camera(video,{
    onFrame:async()=>{
        await faceMesh.send({image:video});
    },
    width:640,
    height:480
});

camera.start();

</script>

</body>
</html>
