<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LipSync — Real-Time Subtitles</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: #2a2a35;
    --accent: #7c6aff;
    --accent2: #a594ff;
    --text: #e8e8f0;
    --text-dim: #7a7a90;
    --text-muted: #44445a;
    --green: #3dffa0;
    --red: #ff4d6d;
    --yellow: #ffd166;
    --subtitle-bg: rgba(10, 10, 15, 0.88);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 1.15rem;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 0.78rem;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.listening {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 1.5s infinite;
  }
  .status-dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 380px;
    grid-template-rows: 1fr auto;
    gap: 0;
    height: calc(100vh - 65px);
  }

  /* ── Camera Section ── */
  .camera-section {
    position: relative;
    background: #05050a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }

  .camera-wrap {
    position: relative;
    width: 100%;
    max-width: 720px;
    aspect-ratio: 16/9;
  }

  #video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
    transform: scaleX(-1);
    display: block;
  }

  #canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    transform: scaleX(-1);
    pointer-events: none;
  }

  /* Subtitle overlay */
  .subtitle-overlay {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 40px);
    max-width: 640px;
    text-align: center;
    z-index: 10;
  }

  .subtitle-box {
    display: inline-block;
    background: var(--subtitle-bg);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(124, 106, 255, 0.3);
    border-radius: 10px;
    padding: 10px 22px;
    min-height: 46px;
    max-width: 100%;
  }

  #live-subtitle {
    font-size: 1.25rem;
    font-weight: 500;
    color: #fff;
    line-height: 1.4;
    letter-spacing: 0.01em;
  }

  #live-subtitle .interim {
    color: var(--accent2);
    opacity: 0.85;
  }

  /* Idle placeholder for camera */
  .camera-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    color: var(--text-muted);
    text-align: center;
  }

  .camera-placeholder .icon {
    font-size: 56px;
    opacity: 0.4;
  }

  .camera-placeholder p {
    font-size: 0.9rem;
    max-width: 280px;
    line-height: 1.5;
  }

  /* Lip activity bar */
  .lip-activity {
    position: absolute;
    top: 16px;
    left: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(10,10,15,0.75);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .lip-activity.visible { opacity: 1; }

  .lip-bar-wrap {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 16px;
  }

  .lip-bar {
    width: 3px;
    background: var(--accent);
    border-radius: 2px;
    transition: height 0.08s;
  }

  /* ── Controls ── */
  .controls-bar {
    grid-column: 1 / 2;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }

  .btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.18s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text); }

  .btn-danger {
    background: rgba(255, 77, 109, 0.12);
    color: var(--red);
    border: 1px solid rgba(255, 77, 109, 0.25);
  }
  .btn-danger:hover { background: rgba(255, 77, 109, 0.2); }

  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  /* Language select */
  select {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select:hover { border-color: var(--accent); }

  .spacer { flex: 1; }

  /* Font size slider */
  .font-control {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.78rem;
    color: var(--text-dim);
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  /* ── Side Panel ── */
  .side-panel {
    grid-row: 1 / 3;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 20px 22px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 0.8rem;
    font-family: 'Space Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .clear-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'Space Grotesk', sans-serif;
    transition: color 0.2s;
    padding: 2px 6px;
  }
  .clear-btn:hover { color: var(--red); }

  /* Transcript log */
  #transcript-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scroll-behavior: smooth;
  }

  #transcript-log::-webkit-scrollbar { width: 4px; }
  #transcript-log::-webkit-scrollbar-track { background: transparent; }
  #transcript-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .transcript-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.9rem;
    line-height: 1.5;
    color: var(--text);
    animation: slideIn 0.25s ease;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .transcript-item:hover { border-color: var(--accent); }
  .transcript-item:hover::after {
    content: '복사';
    position: absolute;
    top: 8px; right: 10px;
    font-size: 0.65rem;
    color: var(--accent2);
    font-family: 'Space Mono', monospace;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .ts-time {
    font-size: 0.65rem;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--text-muted);
    text-align: center;
    padding: 24px;
  }

  .empty-state .icon { font-size: 32px; opacity: 0.4; }
  .empty-state p { font-size: 0.82rem; line-height: 1.5; }

  /* Stats bar */
  .stats-bar {
    padding: 14px 22px;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-val {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
  }

  .stat-label {
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 0.82rem;
    color: var(--text);
    z-index: 999;
    transition: transform 0.3s ease;
    font-family: 'Space Mono', monospace;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Warning banner */
  .warning-banner {
    display: none;
    align-items: center;
    gap: 10px;
    background: rgba(255, 209, 102, 0.08);
    border: 1px solid rgba(255, 209, 102, 0.2);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.8rem;
    color: var(--yellow);
    margin: 12px 24px;
  }

  .warning-banner.show { display: flex; }

  /* Mobile */
  @media (max-width: 800px) {
    main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto auto;
    }
    .side-panel {
      grid-row: auto;
      max-height: 260px;
    }
    .controls-bar {
      grid-column: 1;
      flex-wrap: wrap;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">👄</div>
    LipSync
  </div>
  <div class="status-pill">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Ready</span>
  </div>
</header>

<main>
  <!-- Camera -->
  <div class="camera-section" id="camera-section">
    <div class="camera-wrap" id="camera-wrap" style="display:none">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="canvas"></canvas>
      <div class="lip-activity" id="lip-activity">
        <span>LIPS</span>
        <div class="lip-bar-wrap" id="lip-bars"></div>
      </div>
      <div class="subtitle-overlay">
        <div class="subtitle-box">
          <div id="live-subtitle">—</div>
        </div>
      </div>
    </div>

    <div class="camera-placeholder" id="cam-placeholder">
      <div class="icon">📷</div>
      <p>Press <strong>Start</strong> to activate camera and begin real-time subtitle generation.</p>
    </div>

    <div class="warning-banner" id="warn-banner">
      ⚠️ Speech Recognition requires Chrome or Edge. Safari is not supported.
    </div>
  </div>

  <!-- Controls -->
  <div class="controls-bar">
    <button class="btn btn-primary" id="btn-start">▶ Start</button>
    <button class="btn btn-danger" id="btn-stop" disabled>⏹ Stop</button>
    <select id="lang-select">
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="en-AU">English (AU)</option>
    </select>
    <div class="font-control">
      <span>Aa</span>
      <input type="range" id="font-slider" min="14" max="32" value="20">
      <span>Aa</span>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-secondary" id="btn-copy-all">📋 Copy All</button>
  </div>

  <!-- Side panel -->
  <div class="side-panel">
    <div class="panel-header">
      <span class="panel-title">Transcript</span>
      <button class="clear-btn" id="btn-clear">Clear</button>
    </div>

    <div id="transcript-log">
      <div class="empty-state" id="empty-state">
        <div class="icon">📝</div>
        <p>Recognized speech will appear here as you speak.</p>
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-val" id="stat-words">0</div>
        <div class="stat-label">Words</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-lines">0</div>
        <div class="stat-label">Lines</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-time">0:00</div>
        <div class="stat-label">Duration</div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────
let recognition = null;
let stream = null;
let isRunning = false;
let transcripts = [];
let wordCount = 0;
let startTime = null;
let timerInterval = null;
let lipAnimInterval = null;
let lastInterim = '';

// ── Elements ──────────────────────────────────────────
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const liveSubtitle = document.getElementById('live-subtitle');
const statusDot = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const transcriptLog = document.getElementById('transcript-log');
const emptyState = document.getElementById('empty-state');
const camPlaceholder = document.getElementById('cam-placeholder');
const cameraWrap = document.getElementById('camera-wrap');
const lipActivity = document.getElementById('lip-activity');
const lipBars = document.getElementById('lip-bars');
const warnBanner = document.getElementById('warn-banner');

// ── Check browser support ──────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  warnBanner.classList.add('show');
}

// ── Init lip bars ──────────────────────────────────────
for (let i = 0; i < 8; i++) {
  const bar = document.createElement('div');
  bar.className = 'lip-bar';
  bar.style.height = '3px';
  lipBars.appendChild(bar);
}

function animateLipBars(active) {
  const bars = lipBars.querySelectorAll('.lip-bar');
  bars.forEach(bar => {
    const h = active ? (3 + Math.random() * 13) : 3;
    bar.style.height = h + 'px';
  });
}

// ── Camera ─────────────────────────────────────────────
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    cameraWrap.style.display = 'block';
    camPlaceholder.style.display = 'none';

    // Set canvas size
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    // Start face tracking
    startFaceTracking();
    return true;
  } catch (err) {
    showToast('📷 Camera access denied');
    return false;
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  cameraWrap.style.display = 'none';
  camPlaceholder.style.display = 'flex';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ── Face / Lip Tracking (Canvas overlay) ─────────────
let faceTrackInterval = null;
let lipOpen = false;

function startFaceTracking() {
  lipActivity.classList.add('visible');

  // Simulate lip detection with subtle canvas overlay
  faceTrackInterval = setInterval(() => {
    if (!isRunning) return;
    drawLipOverlay();
  }, 100);
}

function drawLipOverlay() {
  if (!video.videoWidth) return;

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Draw center face guide
  const cx = canvas.width / 2;
  const cy = canvas.height * 0.48;
  const rw = canvas.width * 0.22;
  const rh = canvas.height * 0.3;

  // Face oval
  ctx.beginPath();
  ctx.ellipse(cx, cy, rw, rh, 0, 0, Math.PI * 2);
  ctx.strokeStyle = lipOpen
    ? 'rgba(124, 106, 255, 0.55)'
    : 'rgba(124, 106, 255, 0.2)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Lip region
  const ly = cy + rh * 0.45;
  const lw = rw * 0.52;
  ctx.beginPath();
  ctx.ellipse(cx, ly, lw, lw * 0.35, 0, 0, Math.PI * 2);
  ctx.strokeStyle = lipOpen
    ? 'rgba(61, 255, 160, 0.7)'
    : 'rgba(61, 255, 160, 0.25)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Corner dots
  const corners = [
    [cx - lw, ly],
    [cx + lw, ly],
    [cx, ly - lw * 0.35],
    [cx, ly + lw * 0.35],
  ];
  corners.forEach(([x, y]) => {
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fillStyle = lipOpen ? 'rgba(61,255,160,0.9)' : 'rgba(61,255,160,0.35)';
    ctx.fill();
  });
}

// ── Speech Recognition ────────────────────────────────
function setupRecognition() {
  if (!SpeechRecognition) return null;

  const lang = document.getElementById('lang-select').value;
  const rec = new SpeechRecognition();
  rec.lang = lang;
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onstart = () => {
    setStatus('listening', 'Listening…');
    lipOpen = true;
  };

  rec.onresult = (e) => {
    let interimText = '';
    let finalText = '';

    for (let i = e.resultIndex; i < e.results.length; i++) {
      const text = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalText += text.trim() + ' ';
      } else {
        interimText += text;
      }
    }

    // Animate lip bars
    lipOpen = true;
    animateLipBars(true);

    // Show live subtitle
    if (finalText) {
      liveSubtitle.textContent = finalText.trim();
      addTranscript(finalText.trim());
      setTimeout(() => {
        if (liveSubtitle.textContent === finalText.trim()) {
          liveSubtitle.textContent = '—';
        }
      }, 3000);
    } else if (interimText) {
      liveSubtitle.innerHTML = `<span class="interim">${interimText}</span>`;
    }
  };

  rec.onspeechend = () => {
    lipOpen = false;
    animateLipBars(false);
  };

  rec.onerror = (e) => {
    if (e.error === 'no-speech') return;
    if (e.error === 'not-allowed') {
      setStatus('error', 'Mic denied');
      showToast('🎤 Microphone access denied');
      stopAll();
    }
  };

  rec.onend = () => {
    if (isRunning) {
      // Restart automatically
      try { rec.start(); } catch(err) {}
    } else {
      setStatus('idle', 'Ready');
      lipOpen = false;
      animateLipBars(false);
    }
  };

  return rec;
}

// ── Start / Stop ───────────────────────────────────────
async function startAll() {
  const camOk = await startCamera();
  if (!camOk) return;

  recognition = setupRecognition();
  if (!recognition) {
    showToast('❌ Speech Recognition not supported');
    stopCamera();
    return;
  }

  try {
    recognition.start();
    isRunning = true;
    document.getElementById('btn-start').disabled = true;
    document.getElementById('btn-stop').disabled = false;

    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 1000);

    // Lip bar animation
    lipAnimInterval = setInterval(() => {
      if (!lipOpen) animateLipBars(false);
    }, 150);
  } catch (err) {
    showToast('❌ Could not start recognition');
  }
}

function stopAll() {
  isRunning = false;
  lipOpen = false;

  if (recognition) {
    recognition.stop();
    recognition = null;
  }
  if (faceTrackInterval) clearInterval(faceTrackInterval);
  if (lipAnimInterval) clearInterval(lipAnimInterval);
  if (timerInterval) clearInterval(timerInterval);

  stopCamera();
  animateLipBars(false);
  lipActivity.classList.remove('visible');
  liveSubtitle.textContent = '—';
  setStatus('idle', 'Ready');

  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}

// ── Transcript ─────────────────────────────────────────
function addTranscript(text) {
  if (!text) return;

  transcripts.push({ text, time: new Date() });
  wordCount += text.split(/\s+/).filter(Boolean).length;

  // Remove empty state
  emptyState.remove();

  const item = document.createElement('div');
  item.className = 'transcript-item';

  const ts = document.createElement('div');
  ts.className = 'ts-time';
  const elapsed = startTime ? formatTime(Date.now() - startTime) : '0:00';
  ts.textContent = elapsed;

  const txt = document.createElement('div');
  txt.textContent = text;

  item.appendChild(ts);
  item.appendChild(txt);
  item.addEventListener('click', () => {
    navigator.clipboard.writeText(text).then(() => showToast('✅ Copied'));
  });

  transcriptLog.appendChild(item);
  transcriptLog.scrollTop = transcriptLog.scrollHeight;

  updateStats();
}

function updateStats() {
  document.getElementById('stat-words').textContent = wordCount;
  document.getElementById('stat-lines').textContent = transcripts.length;
}

function updateTimer() {
  if (!startTime) return;
  document.getElementById('stat-time').textContent = formatTime(Date.now() - startTime);
}

function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

// ── UI Helpers ─────────────────────────────────────────
function setStatus(state, label) {
  statusText.textContent = label;
  statusDot.className = 'status-dot ' + (state === 'listening' ? 'listening' : state === 'error' ? 'error' : '');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Events ─────────────────────────────────────────────
document.getElementById('btn-start').addEventListener('click', startAll);
document.getElementById('btn-stop').addEventListener('click', stopAll);

document.getElementById('btn-clear').addEventListener('click', () => {
  transcripts = [];
  wordCount = 0;
  transcriptLog.innerHTML = '';
  const es = document.createElement('div');
  es.className = 'empty-state';
  es.id = 'empty-state';
  es.innerHTML = '<div class="icon">📝</div><p>Recognized speech will appear here as you speak.</p>';
  transcriptLog.appendChild(es);
  updateStats();
});

document.getElementById('btn-copy-all').addEventListener('click', () => {
  const all = transcripts.map(t => t.text).join('\n');
  if (!all) { showToast('Nothing to copy'); return; }
  navigator.clipboard.writeText(all).then(() => showToast('✅ All copied!'));
});

document.getElementById('font-slider').addEventListener('input', (e) => {
  liveSubtitle.style.fontSize = e.target.value + 'px';
});
</script>
</body>
</html>
