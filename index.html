<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);background:transparent;color:var(--color-text-primary)}
#root{display:flex;flex-direction:column;gap:16px;padding:16px 0}
#top{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:start}
video,canvas{width:100%;border-radius:var(--border-radius-lg,12px);display:block}
#video-wrap{position:relative;background:#000;border-radius:var(--border-radius-lg,12px);overflow:hidden}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%}
video{opacity:0;position:absolute;top:0;left:0}
#panel{display:flex;flex-direction:column;gap:10px}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg,12px);padding:14px}
.label{font-size:12px;color:var(--color-text-secondary);margin-bottom:6px}
#state-badge{display:inline-block;font-size:28px;font-weight:500;padding:4px 0;letter-spacing:2px;min-height:42px}
.bar-wrap{margin-bottom:8px}
.bar-label{display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:3px}
.bar-bg{height:8px;border-radius:4px;background:var(--color-background-secondary,#f0f0f0);overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width 0.1s}
#transcript-box{min-height:72px;font-size:15px;line-height:1.6;color:var(--color-text-primary);padding:12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md,8px);word-break:keep-all}
#history-wrap{display:flex;flex-wrap:wrap;gap:4px;min-height:24px}
.hist-chip{font-size:13px;padding:2px 7px;border-radius:20px;background:var(--color-background-secondary);color:var(--color-text-secondary)}
#btn-row{display:flex;gap:8px}
button{padding:8px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md,8px);background:transparent;color:var(--color-text-primary);cursor:pointer;font-size:13px;transition:background 0.15s}
button:hover{background:var(--color-background-secondary)}
button:active{transform:scale(0.98)}
#status{font-size:12px;color:var(--color-text-secondary);padding:4px 0}
#lip-canvas{display:block;width:100%;border-radius:var(--border-radius-lg);background:#111}
</style>
</head>
<body>
<div id="root">
  <div id="btn-row">
    <button id="btn-start"><i class="ti ti-player-play" aria-hidden="true"></i> 시작</button>
    <button id="btn-stop" disabled><i class="ti ti-player-pause" aria-hidden="true"></i> 정지</button>
    <span id="status">카메라 권한이 필요합니다</span>
  </div>
  <div id="top">
    <div id="video-wrap">
      <video id="vid" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
    </div>
    <div id="panel">
      <div class="card">
        <div class="label">인식된 입 모양</div>
        <div id="state-badge">—</div>
        <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px" id="phoneme-hint"></div>
      </div>
      <div class="card">
        <div class="label">측정값</div>
        <div class="bar-wrap">
          <div class="bar-label"><span>입 개방 (MAR)</span><span id="mar-val">0.00</span></div>
          <div class="bar-bg"><div class="bar-fill" id="mar-bar" style="width:0%;background:#4ade80"></div></div>
        </div>
        <div class="bar-wrap">
          <div class="bar-label"><span>입 너비</span><span id="mw-val">0.00</span></div>
          <div class="bar-bg"><div class="bar-fill" id="mw-bar" style="width:0%;background:#60a5fa"></div></div>
        </div>
        <div class="bar-wrap">
          <div class="bar-label"><span>입꼬리 비대칭</span><span id="asym-val">0.00</span></div>
          <div class="bar-bg"><div class="bar-fill" id="asym-bar" style="width:0%;background:#f472b6"></div></div>
        </div>
      </div>
      <div class="card">
        <div class="label">최근 상태 이력</div>
        <div id="history-wrap"></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="label" style="margin-bottom:8px">음성 인식 자막 (STT)</div>
    <div id="transcript-box">음성 인식을 시작하면 자막이 여기 표시됩니다.</div>
  </div>
</div>
<script>
const UPPER=13,LOWER=14,L_MOUTH=61,R_MOUTH=291,L_SMILE=308,R_SMILE=78;
const STATE_COLOR={OPEN:'#4ade80',CLOSED:'#9ca3af',SMILE:'#fbbf24','아':'#f87171','이':'#60a5fa','우':'#a78bfa','에':'#34d399','오':'#fb923c','ㅡ':'#e879f9'};

const vid=document.getElementById('vid');
const cvs=document.getElementById('overlay');
const ctx=cvs.getContext('2d');
const badge=document.getElementById('state-badge');
const hint=document.getElementById('phoneme-hint');
const histWrap=document.getElementById('history-wrap');
const transcript=document.getElementById('transcript-box');
const status=document.getElementById('status');
const btnStart=document.getElementById('btn-start');
const btnStop=document.getElementById('btn-stop');

let history=[];
let recognition=null;
let camera=null;
let running=false;

function pt(lm,idx,w,h){return[lm[idx].x*w,lm[idx].y*h]}
function dist(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1])}

function classify(lm,w,h){
  const upper=pt(lm,UPPER,w,h);
  const lower=pt(lm,LOWER,w,h);
  const left=pt(lm,L_MOUTH,w,h);
  const right=pt(lm,R_MOUTH,w,h);
  const sl=pt(lm,L_SMILE,w,h);
  const sr=pt(lm,R_SMILE,w,h);
  const vert=dist(upper,lower);
  const horiz=dist(left,right)+1e-6;
  const smileD=dist(sl,sr);
  const mar=vert/horiz;
  const mw=horiz/Math.max(w,h);
  const asym=Math.abs(left[1]-right[1])/h;
  const smileR=smileD/horiz;

  let vowel='—', korean='';
  if(mar>0.35){vowel='아';korean='ㅏ — 입을 크게 벌림'}
  else if(mar>0.18 && mw>0.08){vowel='에';korean='ㅔ/ㅐ — 중간 개방'}
  else if(mar<0.08 && mw>0.09){vowel='이';korean='ㅣ — 옆으로 벌림'}
  else if(mar>0.15 && mw<0.07){vowel='우';korean='ㅜ — 앞으로 돌출'}
  else if(mar>0.12 && smileR<0.65){vowel='오';korean='ㅗ — 원형 개방'}
  else if(mar<0.10 && smileR<0.70){vowel='ㅡ';korean='ㅡ — 납작하게 닫힘'}
  else if(smileR>0.78){vowel='SMILE';korean='미소'}
  else if(mar<0.09){vowel='CLOSED';korean='닫힘'}
  else{vowel='?';korean='분류 중...'}

  return{vowel,korean,mar,mw,asym};
}

function drawLips(lm,w,h){
  const outline=[61,146,91,181,84,17,314,405,321,375,291,308,324,318,402,317,14,87,178,88,95,78,191,80,81,82,13,312,311,310,415,308];
  ctx.beginPath();
  outline.forEach((idx,i)=>{
    const [x,y]=pt(lm,idx,w,h);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.strokeStyle='rgba(99,179,237,0.85)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  [[UPPER,14],[LOWER,14],[L_MOUTH,5],[R_MOUTH,5]].forEach(([idx,r])=>{
    const [x,y]=pt(lm,idx,w,h);
    ctx.beginPath();
    ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(74,222,128,0.9)';
    ctx.fill();
  });
}

function updateUI(result,lm,w,h){
  const c=STATE_COLOR[result.vowel]||'#9ca3af';
  badge.textContent=result.vowel;
  badge.style.color=c;
  hint.textContent=result.korean;
  document.getElementById('mar-val').textContent=result.mar.toFixed(2);
  document.getElementById('mar-bar').style.width=Math.min(result.mar/0.5*100,100)+'%';
  document.getElementById('mw-val').textContent=result.mw.toFixed(2);
  document.getElementById('mw-bar').style.width=Math.min(result.mw/0.15*100,100)+'%';
  document.getElementById('asym-val').textContent=result.asym.toFixed(3);
  document.getElementById('asym-bar').style.width=Math.min(result.asym/0.04*100,100)+'%';

  history.push({v:result.vowel,c});
  if(history.length>16)history.shift();
  histWrap.innerHTML=history.map(e=>`<span class="hist-chip" style="color:${e.c}">${e.v}</span>`).join('');
}

function onResults(results){
  cvs.width=vid.videoWidth||640;
  cvs.height=vid.videoHeight||480;
  ctx.clearRect(0,0,cvs.width,cvs.height);
  ctx.drawImage(results.image,0,0,cvs.width,cvs.height);

  if(results.multiFaceLandmarks&&results.multiFaceLandmarks.length>0){
    const lm=results.multiFaceLandmarks[0];
    drawLips(lm,cvs.width,cvs.height);
    const r=classify(lm,cvs.width,cvs.height);
    updateUI(r,lm,cvs.width,cvs.height);
  } else {
    ctx.fillStyle='rgba(99,102,241,0.7)';
    ctx.font='18px sans-serif';
    ctx.fillText('얼굴을 카메라에 보여주세요',20,40);
  }
}

function startSTT(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){transcript.textContent='⚠️ 이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해주세요.';return;}
  recognition=new SR();
  recognition.lang='ko-KR';
  recognition.continuous=true;
  recognition.interimResults=true;
  let finalText='';
  recognition.onresult=(e)=>{
    let interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal){finalText+=t+' ';}
      else interim+=t;
    }
    transcript.innerHTML=`<span style="color:var(--color-text-primary)">${finalText}</span><span style="color:var(--color-text-secondary)">${interim}</span>`;
  };
  recognition.onerror=(e)=>{ if(e.error!=='no-speech')status.textContent='STT 오류: '+e.error; };
  recognition.onend=()=>{ if(running)recognition.start(); };
  recognition.start();
}

async function startAll(){
  running=true;
  btnStart.disabled=true;
  btnStop.disabled=false;
  status.textContent='카메라 연결 중...';

  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480},audio:false});
    vid.srcObject=stream;
    await vid.play();

    const faceMesh=new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
    faceMesh.onResults(onResults);

    camera=new Camera(vid,{
      onFrame:async()=>{await faceMesh.send({image:vid});},
      width:640,height:480
    });
    camera.start();
    status.textContent='✓ 인식 중 — 입 모양을 보여주세요';
    startSTT();
  } catch(e){
    status.textContent='오류: '+e.message;
    running=false;
    btnStart.disabled=false;
    btnStop.disabled=true;
  }
}

function stopAll(){
  running=false;
  if(recognition){recognition.stop();recognition=null;}
  if(camera){camera.stop();camera=null;}
  if(vid.srcObject)vid.srcObject.getTracks().forEach(t=>t.stop());
  badge.textContent='—';
  hint.textContent='';
  history=[];
  histWrap.innerHTML='';
  status.textContent='정지됨';
  btnStart.disabled=false;
  btnStop.disabled=true;
}

btnStart.onclick=startAll;
btnStop.onclick=stopAll;
</script>
</body>
</html>
